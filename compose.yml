services:
  new-atlas:
    build: ./new-atlas/server
    command: "gunicorn --bind :8082 atlas.wsgi"
    env_file: new-atlas.env
    ports:
      - ${NEW_ATLAS_PORT:-8082}:8082

  scaife-viewer:
    build:
      context: ./scaife-viewer
      dockerfile: Dockerfile
    command: "gunicorn sv_pdl.wsgi:application"
    depends_on:
      scaife-postgres:
        condition: service_healthy
      scaife-elasticsearch:
        condition: service_healthy
    entrypoint: deploy/entrypoint.sh
    env_file: .env
    ports:
      - ${SCAIFE_VIEWER_PORT:-8000}:8000

  scaife-postgres:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-scaife}
      USE_ELASTICSEARCH_SERVICE: 1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - sv-postgres-data:/var/lib/postgresql/data

  scaife-elasticsearch:
    build:
      context: ./scaife-viewer
      dockerfile: Dockerfile-elasticsearch
    environment:
      - cluster.name=docker-cluster
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - discovery.type=single-node
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fs http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - sv-elasticsearch-data:/usr/share/elasticsearch/data

volumes:
  sv-postgres-data:
  sv-elasticsearch-data:
